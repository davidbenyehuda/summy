services:
  postgres:
    image: postgres:16-alpine
    container_name: sammy-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sammy
      POSTGRES_PASSWORD: sammy_dev
      POSTGRES_DB: sammy
    volumes:
      - sammy_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sammy -d sammy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sammy_pg_data:
